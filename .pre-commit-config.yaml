repos:
  - repo: local
    hooks:
      - id: black
        name: black
        entry: .venv/Scripts/python.exe -m black
        language: system
        types_or: [python, pyi]

      - id: isort
        name: isort
        entry: .venv/Scripts/python.exe -m isort
        language: system
        types_or: [python, pyi]

      - id: ruff
        name: ruff
        entry: .venv/Scripts/python.exe -m ruff check --fix
        language: system
        types_or: [python, pyi]

      - id: mypy
        name: mypy
        entry: .venv/Scripts/python.exe -m mypy
        language: system
        files: ^halbach/
        pass_filenames: false
